<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening System</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; padding: 40px; }
        .box { background: white; padding: 30px; width: 65%; margin: auto; border-radius: 10px; }
        h1 { color: #2c3e50; }
        input, button { margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        button { padding: 10px 20px; background: #2ecc71; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>📄 AI Resume Screening System</h1>

    <form method="POST" enctype="multipart/form-data">
        <label><b>Upload Job Description (PDF / TXT)</b></label><br>
        <input type="file" name="job_description" required><br><br>

        <label><b>Upload Resumes (Multiple PDF / TXT)</b></label><br>
        <input type="file" name="resumes" multiple required><br><br>

        <button type="submit">Rank Resumes</button>
    </form>

    {% if results %}
    <h2>📊 Ranking Results</h2>
    <table>
        <tr>
            <th>Resume</th>
            <th>Match Score</th>
        </tr>
        {% for resume, score in results %}
        <tr>
            <td>{{ resume }}</td>
            <td>{{ "%.2f"|format(score * 100) }}%</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
</div>

</body>
</html>
